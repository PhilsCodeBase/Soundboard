<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Soundboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#141413;
    --panel:#1c1b19;
    --panel-2:#232220;
    --border:#38362f;
    --border-strong:#545145;
    --text:#eeece5;
    --text-dim:rgba(238,236,229,0.58);
    --text-faint:rgba(238,236,229,0.34);
    --accent:#ff5a1f;
    --accent-dim:rgba(255,90,31,0.16);
    --accent-2:#7fd9c4;
    --danger:#ff5d5d;
    --radius:6px;
    --radius-sm:4px;
    --font-mono:'JetBrains Mono', ui-monospace, monospace;
    --font-body:'IBM Plex Sans', system-ui, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0; touch-action:manipulation;}
  body{
    background:var(--bg);
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size:100% 34px;
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    padding-bottom:60px;
    -webkit-tap-highlight-color:transparent;
  }
  a{color:inherit;}
  button, .pad, input[type=range]{ touch-action:manipulation; -webkit-tap-highlight-color:transparent; }

  header{padding:40px 24px 22px; max-width:1180px; margin:0 auto; position:relative;}
  .rivet{position:absolute; width:5px; height:5px; border-radius:50%; background:var(--border-strong); box-shadow:inset 0 1px 1px rgba(0,0,0,.6);}
  .rivet.tl{top:14px; left:14px;} .rivet.tr{top:14px; right:14px;}

  .kicker{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; color:var(--accent);
    text-transform:uppercase; margin-bottom:14px; display:flex; align-items:center; gap:8px;
  }
  .kicker::before{content:"●"; font-size:8px;}
  h1{
    font-family:var(--font-mono); font-weight:700; font-size:clamp(26px,4vw,36px);
    margin:0 0 10px; letter-spacing:-0.01em; line-height:1.15; text-transform:uppercase;
  }
  .subtitle{color:var(--text-dim); font-size:14.5px; max-width:520px; line-height:1.55; margin:0 0 26px; font-weight:400;}

  .toolbar{display:flex; flex-wrap:wrap; align-items:center; gap:10px;}
  .toolbar .spacer{flex:1;}

  button{font-family:var(--font-mono); cursor:pointer;}
  .btn{
    display:inline-flex; align-items:center; gap:7px; background:var(--panel);
    border:1px solid var(--border); color:var(--text); padding:9px 14px; border-radius:var(--radius-sm);
    font-size:12px; font-weight:500; letter-spacing:.02em; transition:border-color .12s, background .12s;
  }
  .btn:hover{border-color:var(--border-strong); background:var(--panel-2);}
  .btn:active{transform:translateY(1px);}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#1a0e08; font-weight:700;}
  .btn.primary:hover{filter:brightness(1.08);}
  .btn.danger-outline{border-color:rgba(255,93,93,.35); color:#ff9d9d;}
  .btn.danger-outline:hover{background:rgba(255,93,93,.1); border-color:var(--danger);}
  .btn svg{width:14px;height:14px;flex:none;}

  .chip{display:flex; align-items:center; gap:9px; background:var(--panel); border:1px solid var(--border); padding:8px 13px; border-radius:var(--radius-sm);}
  .chip svg{width:15px;height:15px;color:var(--text-dim);flex:none;}
  input[type=range]{-webkit-appearance:none; width:92px; height:2px; background:var(--border-strong); border-radius:1px; outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:11px;height:11px;border-radius:2px; background:var(--accent); cursor:pointer; border:none;}
  input[type=range]::-moz-range-thumb{width:11px;height:11px;border-radius:2px; background:var(--accent); border:none; cursor:pointer;}

  main{max-width:1180px; margin:0 auto; padding:8px 24px 0;}
  .pads{display:grid; grid-template-columns:repeat(auto-fill, minmax(158px,1fr)); gap:12px;}

  .pad{
    position:relative; aspect-ratio:1/1; background:var(--panel);
    border:1px solid var(--border); border-radius:var(--radius); padding:12px;
    display:flex; flex-direction:column; justify-content:space-between; text-align:left; color:var(--text);
    overflow:hidden; user-select:none;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.03), inset 0 -6px 10px -6px rgba(0,0,0,.4);
    transition:border-color .1s, box-shadow .12s;
  }
  .pad:hover{border-color:var(--border-strong);}
  .pad.pressed{ box-shadow:inset 0 2px 6px rgba(0,0,0,.5); }
  .pad:focus-visible{outline:1px solid var(--accent); outline-offset:2px;}
  .pad.empty{border-style:dashed; align-items:center; justify-content:center; color:var(--text-faint);}
  .pad.empty:hover{color:var(--text); border-color:var(--accent);}
  .pad.dragover{border-color:var(--accent); background:var(--accent-dim);}
  .pad.playing{border-color:var(--pad-color, var(--accent)); box-shadow:0 0 0 1px var(--pad-color, var(--accent)), inset 0 1px 0 rgba(255,255,255,.05);}
  .pad.skeleton{border-style:solid; animation:skeletonPulse 1.3s ease-in-out infinite;}
  @keyframes skeletonPulse{0%,100%{opacity:.35;}50%{opacity:.7;}}

  .led{position:absolute; top:12px; right:12px; width:6px; height:6px; border-radius:50%; background:var(--border-strong);}
  .pad.playing .led{background:var(--pad-color, var(--accent)); box-shadow:0 0 6px var(--pad-color, var(--accent));}

  .progress-track{position:absolute; left:0; bottom:0; width:100%; height:2px; background:transparent;}
  .progress-bar{height:100%; width:0%; background:var(--pad-color, var(--accent));}

  .pad-top{display:flex; justify-content:space-between; align-items:flex-start;}
  .pad-meta{display:flex; flex-direction:column; gap:3px;}
  .pad-index{font-family:var(--font-mono); font-size:10px; color:var(--text-faint); letter-spacing:.04em;}
  .pad-badge{font-family:var(--font-mono); font-size:8px; letter-spacing:.05em; text-transform:uppercase; color:var(--text-faint);}
  .pad-edit{
    opacity:0; background:rgba(0,0,0,.32); border:none; color:var(--text); width:22px;height:22px; border-radius:var(--radius-sm);
    display:flex; align-items:center; justify-content:center; transition:opacity .12s, background .12s;
  }
  .pad-top-actions{display:flex; gap:5px;}
  .pad-stop{
    opacity:0; background:rgba(0,0,0,.32); border:none; color:var(--text); width:22px;height:22px; border-radius:var(--radius-sm);
    display:flex; align-items:center; justify-content:center; transition:opacity .12s, background .12s;
  }
  .pad.playing .pad-stop{opacity:1;}
  .pad-stop:hover{background:rgba(255,93,93,.5);}
  .pad-stop svg{width:10px;height:10px;}
  .pad-handle{
    opacity:0; background:rgba(0,0,0,.32); border:none; color:var(--text); width:22px;height:22px; border-radius:var(--radius-sm);
    display:flex; align-items:center; justify-content:center; cursor:grab; touch-action:none;
  }
  .pad-handle svg{width:12px;height:12px;}
  .pad.drag-source{opacity:.35;}
  .pad.drag-over{outline:2px dashed var(--accent); outline-offset:2px;}
  .pad:hover .pad-edit, .pad:focus-within .pad-edit, .pad:hover .pad-stop, .pad:focus-within .pad-stop, .pad:hover .pad-handle, .pad:focus-within .pad-handle{opacity:1;}
  .pad-edit:hover{background:rgba(0,0,0,.55);}
  .pad-edit svg{width:12px;height:12px;}

  .pad-emoji{font-size:22px; line-height:1; margin:2px 0;}
  .pad-label{font-family:var(--font-body); font-weight:600; font-size:13px; line-height:1.25; word-break:break-word;}
  .pad-empty-label{font-size:11px; font-family:var(--font-mono); margin-top:4px;}

  .pad-fader-row{display:flex; align-items:center; gap:6px;}
  .pad-fader{
    -webkit-appearance:none; flex:1; height:14px; background:transparent; margin:0;
  }
  .pad-fader::-webkit-slider-runnable-track{height:2px; background:var(--border-strong); border-radius:1px;}
  .pad-fader::-webkit-slider-thumb{
    -webkit-appearance:none; width:8px; height:14px; border-radius:1px; margin-top:-6px;
    background:var(--pad-color, var(--accent)); cursor:pointer; border:none;
  }
  .pad-fader::-moz-range-track{height:2px; background:var(--border-strong); border-radius:1px;}
  .pad-fader::-moz-range-thumb{width:8px; height:14px; border-radius:1px; background:var(--pad-color, var(--accent)); border:none; cursor:pointer;}
  .pad-speed-val{font-family:var(--font-mono); font-size:8.5px; color:var(--text-faint); min-width:26px; text-align:right;}

  .pad-bottom{display:flex; align-items:center; justify-content:space-between; gap:6px;}
  .pad-key{font-family:var(--font-mono); font-size:9px; color:var(--text-dim); background:rgba(255,255,255,.05); border:1px solid var(--border); padding:2px 5px; border-radius:var(--radius-sm); text-transform:uppercase;}

  .add-pad{background:transparent; color:var(--text-faint); font-family:var(--font-mono); font-size:11px; border-style:dashed;}
  .add-pad:hover{color:var(--accent); border-color:var(--accent);}
  .add-pad svg{width:18px;height:18px;}

  .empty-state{
    grid-column:1/-1; text-align:center; padding:38px 20px; color:var(--text-dim);
    border:1px dashed var(--border); border-radius:var(--radius); font-size:13px; line-height:1.6;
  }
  .empty-state strong{color:var(--text); display:block; font-family:var(--font-mono); font-size:13px; margin-bottom:6px; text-transform:uppercase; letter-spacing:.05em;}

  .hidden-hint{grid-column:1/-1; font-family:var(--font-mono); font-size:10.5px; color:var(--text-faint); text-align:center; padding:6px 0 2px;}
  .hidden-hint button{background:none;border:none;color:var(--accent); font-family:var(--font-mono); font-size:10.5px; text-decoration:underline; cursor:pointer; padding:0;}

  .overlay{position:fixed; inset:0; background:rgba(8,7,6,.7); display:none; align-items:center; justify-content:center; padding:18px; z-index:50; overflow-y:auto;}
  .overlay.open{display:flex;}
  .modal{background:#191815; border:1px solid var(--border-strong); border-radius:10px; width:100%; max-width:430px; padding:22px; box-shadow:0 24px 60px -16px rgba(0,0,0,.7); margin:auto;}
  .modal h2{font-family:var(--font-mono); font-weight:700; font-size:16px; margin:0 0 4px; text-transform:uppercase; letter-spacing:.02em;}
  .modal .modal-sub{color:var(--text-dim); font-size:12px; margin:0 0 18px; line-height:1.5;}
  .field{margin-bottom:15px;}
  .field label{display:block; font-size:10px; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.06em; color:var(--text-faint); margin-bottom:6px;}
  .field label .field-val{color:var(--text-dim); text-transform:none; letter-spacing:0; float:right;}
  .field input[type=text]{width:100%; background:rgba(255,255,255,.03); border:1px solid var(--border); color:var(--text); padding:9px 11px; border-radius:var(--radius-sm); font-size:13.5px; font-family:var(--font-body);}
  .field input[type=text]:focus{outline:none; border-color:var(--accent);}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .swatches{display:flex; gap:8px; flex-wrap:wrap;}
  .swatch{width:21px;height:21px;border-radius:3px; border:2px solid transparent; cursor:pointer;}
  .swatch.selected{border-color:var(--text);}
  .dropzone{display:block; border:1.5px dashed var(--border-strong); border-radius:var(--radius-sm); padding:14px; text-align:center; font-size:11.5px; color:var(--text-dim); cursor:pointer; transition:border-color .12s, color .12s, background .12s;}
  .dropzone:hover, .dropzone.dragover{border-color:var(--accent); color:var(--text); background:var(--accent-dim);}
  .dropzone strong{color:var(--accent); font-weight:600;}
  .file-current{font-family:var(--font-mono); font-size:10.5px; color:var(--accent-2); margin-top:8px;}
  .inline-row{display:flex; align-items:center; gap:8px; margin-top:8px; flex-wrap:wrap;}
  .modal-actions{display:flex; justify-content:space-between; align-items:center; margin-top:20px; gap:10px;}
  .modal-actions .right{display:flex; gap:8px;}
  select{width:100%; background:rgba(255,255,255,.03); border:1px solid var(--border); color:var(--text); padding:9px 11px; border-radius:var(--radius-sm); font-size:13.5px; font-family:var(--font-body);}
  .source-tag{display:inline-flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:9.5px; color:var(--text-dim); background:rgba(255,255,255,.04); border:1px solid var(--border); padding:4px 8px; border-radius:var(--radius-sm); margin-bottom:16px; text-transform:uppercase; letter-spacing:.04em;}
  .reset-link{background:none; border:none; color:var(--accent-2); font-family:var(--font-mono); font-size:11px; text-decoration:underline; cursor:pointer; padding:0; margin-top:8px;}

  .or-divider{display:flex; align-items:center; gap:10px; margin:14px 0; color:var(--text-faint); font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:.06em;}
  .or-divider::before, .or-divider::after{content:""; flex:1; height:1px; background:var(--border);}
  .record-row{display:flex; align-items:center; gap:12px;}
  .btn.record-active{border-color:var(--danger); color:#ffb0b0; background:rgba(255,93,93,.12);}
  .rec-dot{display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--danger); animation:recblink 1s infinite;}
  @keyframes recblink{0%,100%{opacity:1;}50%{opacity:.25;}}
  .record-timer{font-family:var(--font-mono); font-size:11px; color:var(--text-dim);}

  .editor-panel{margin-top:14px; padding:14px; background:rgba(255,255,255,.02); border:1px solid var(--border); border-radius:var(--radius-sm);}
  .waveform-wrap{position:relative; height:52px; border-radius:3px; overflow:hidden; background:rgba(255,255,255,.02); margin-bottom:12px;}
  .waveform{width:100%; height:100%; display:block;}
  .trim-highlight{position:absolute; top:0; bottom:0; left:0; right:0; background:rgba(255,90,31,.14); border-left:2px solid var(--accent); border-right:2px solid var(--accent); pointer-events:none;}
  .trim-row{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
  .trim-row label{font-family:var(--font-mono); font-size:9.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.04em; width:32px; flex:none;}
  .trim-row input[type=range]{flex:1; width:auto;}
  .trim-row .time{font-family:var(--font-mono); font-size:10.5px; color:var(--text-dim); width:36px; text-align:right; flex:none;}
  .editor-actions{display:flex; gap:8px; justify-content:flex-end; margin-top:10px; flex-wrap:wrap;}

  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(14px); background:#1c1a17;
    border:1px solid var(--border-strong); padding:10px 16px; border-radius:var(--radius-sm); font-size:12.5px;
    opacity:0; pointer-events:none; transition:opacity .18s, transform .18s; z-index:100;
    display:flex; align-items:center; gap:9px; box-shadow:0 10px 26px -10px rgba(0,0,0,.6); font-family:var(--font-mono);
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast .dot{width:6px;height:6px;border-radius:50%; background:var(--accent);}

  .visually-hidden-file{position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; white-space:nowrap; border:0;}
  .hidden-input{display:none;}
</style>
</head>
<body>

<header>
  <span class="rivet tl"></span><span class="rivet tr"></span>
  <div class="kicker">Soundboard · Live-Einheit</div>
  <h1>Spiel deine Sounds</h1>
  <p class="subtitle">Tippe auf ein Pad, um einen Sound abzuspielen — beliebig viele gleichzeitig. Nochmal tippen stoppt den Sound und startet ihn neu von vorn.</p>

  <div class="toolbar">
    <div class="chip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="M16 8a5 5 0 0 1 0 8"/></svg>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.85">
    </div>
    <button class="btn danger-outline" id="stopAllBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
      Alle stoppen
    </button>
    <div class="spacer"></div>
    <button class="btn ghost" id="exportBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
      Sichern
    </button>
    <button class="btn ghost" id="importBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21V9"/><path d="m7 14 5-5 5 5"/><path d="M5 3h14"/></svg>
      Laden
    </button>
    <input type="file" id="importInput" class="visually-hidden-file" accept="application/json,.json">
    <button class="btn danger-outline" id="clearAllSoundsBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      Alle Pads entfernen
    </button>
    <button class="btn danger-outline" id="resetAllBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v6h6"/></svg>
      Zurücksetzen
    </button>
  </div>
</header>

<main>
  <div class="pads" id="padsGrid"></div>
</main>

<div class="overlay" id="overlay">
  <div class="modal">
    <span class="source-tag" id="sourceTag">Eigener Sound</span>
    <h2 id="modalTitle">Pad bearbeiten</h2>
    <p class="modal-sub" id="modalSub">Sound zuweisen — wird sofort gespeichert.</p>

    <div class="field">
      <label>Beschriftung</label>
      <input type="text" id="labelInput" maxlength="24" placeholder="z. B. Applaus">
    </div>

    <div class="row2">
      <div class="field">
        <label>Icon / Emoji</label>
        <input type="text" id="emojiInput" maxlength="4" placeholder="🔊">
      </div>
      <div class="field">
        <label>Tastenkürzel</label>
        <select id="keySelect"></select>
      </div>
    </div>

    <div class="field">
      <label>Farbe</label>
      <div class="swatches" id="swatches"></div>
    </div>

    <div class="field">
      <label>Sound</label>
      <label class="dropzone" id="dropzone" for="fileInput">
        <strong>Datei auswählen</strong> oder hierher ziehen<br>MP3, WAV, OGG, M4A …
      </label>
      <div class="file-current" id="fileCurrent"></div>
      <div class="inline-row">
        <button class="reset-link hidden-input" id="resetOverrideBtn">Preset wiederherstellen</button>
        <button class="reset-link hidden-input" id="trimExistingBtn">Zuschneiden</button>
      </div>
      <input type="file" id="fileInput" class="visually-hidden-file" accept="audio/*,.mp3,.wav,.ogg,.oga,.m4a,.aac,.flac,.webm,.opus">

      <div class="or-divider">oder</div>
      <div class="record-row">
        <button class="btn ghost" id="recordBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
          Sound aufnehmen
        </button>
        <span class="record-timer" id="recordTimer"></span>
      </div>

      <div class="editor-panel hidden-input" id="editorPanel">
        <div class="waveform-wrap">
          <canvas id="waveformCanvas" class="waveform"></canvas>
          <div class="trim-highlight" id="trimHighlight"></div>
        </div>
        <div class="trim-row">
          <label>Start</label>
          <input type="range" id="trimStart" min="0" max="1" step="0.01" value="0">
          <span class="time" id="trimStartLabel">0:00</span>
        </div>
        <div class="trim-row">
          <label>Ende</label>
          <input type="range" id="trimEnd" min="0" max="1" step="0.01" value="1">
          <span class="time" id="trimEndLabel">0:00</span>
        </div>
        <audio id="editorPreviewAudio"></audio>
        <div class="editor-actions">
          <button class="btn ghost" id="previewTrimBtn" type="button">Vorschau</button>
          <button class="btn ghost" id="discardEditBtn" type="button">Verwerfen</button>
          <button class="btn primary" id="applyEditBtn" type="button">Übernehmen</button>
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn danger-outline" id="deletePadBtn">Löschen</button>
      <div class="right">
        <button class="btn ghost" id="cancelBtn">Abbrechen</button>
        <button class="btn primary" id="saveBtn">Speichern</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span class="dot"></span><span id="toastText"></span></div>

<script>
(function(){
  "use strict";

  /* ---------------- IndexedDB ---------------- */
  const DB_NAME = "soundboardDB";
  const STORE = "sounds";
  function openDB(){
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => req.result.createObjectStore(STORE);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  async function idbSet(id, blob){
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).put(blob, id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }
  async function idbGet(id){
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readonly");
      const r = tx.objectStore(STORE).get(id);
      r.onsuccess = () => resolve(r.result || null);
      r.onerror = () => reject(r.error);
    });
  }
  async function idbDelete(id){
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  /* ---------------- State ---------------- */
  const PALETTE = ["#ff5a1f","#7fd9c4","#e0b23f","#c96b8a","#8a94ff","#9bcf5a"];
  const DEFAULT_KEYS = "1234567890qwertzuiop".split("");

  const LS_VOL = "soundboard_volume_v4";
  const LS_HIDDEN = "soundboard_hidden_repo_v4";

  let pads = [];

  function uid(){
    return (crypto.randomUUID ? crypto.randomUUID() : "p" + Math.random().toString(36).slice(2) + Date.now());

  function isAudioFile(file){
    if(!file) return false;
    if(file.type && file.type.startsWith("audio/")) return true;
    return /\.(mp3|wav|ogg|oga|m4a|aac|flac|webm|opus)$/i.test(file.name || "");
  }

  function loadLocalState(){
    try{
      const raw = localStorage.getItem(LS_PADS);
      pads = raw ? JSON.parse(raw) : [];
    }catch(e){ pads = []; }
    const v = localStorage.getItem(LS_VOL);
    volume = v !== null ? parseFloat(v) : 0.85;
  }
  function saveState(){
    localStorage.setItem(LS_PADS, JSON.stringify(pads));
    localStorage.setItem(LS_VOL, String(volume));
  }
  function getHidden(){
    try{ return new Set(JSON.parse(localStorage.getItem(LS_HIDDEN) || "[]")); }catch(e){ return new Set(); }
  }
  function setHidden(set){ localStorage.setItem(LS_HIDDEN, JSON.stringify([...set])); }

  function resolveKeyConflicts(){
    const seen = new Set();
    pads.forEach(p => {
      if(p.key){
        if(seen.has(p.key)) p.key = "";
        else seen.add(p.key);
      }
    });
  }

  async function loadManifestAndMerge(){
    let manifest = [];
    try{
      const res = await fetch("sounds/manifest.json", { cache: "no-store" });
      if(res.ok) manifest = await res.json();
    }catch(e){ manifest = []; }

    const hidden = getHidden();
    let colorCursor = pads.length;
    manifest.forEach(entry => {
      if(!entry || !entry.file) return;
      const id = "repo:" + entry.file;
      if(hidden.has(id)) return;
      let pad = pads.find(p => p.id === id);
      if(!pad){
        pad = {
          id, source: "repo",
          soundFile: "sounds/" + entry.file,
          label: entry.label || entry.file.replace(/\.[^/.]+$/, ""),
          emoji: entry.emoji || "",
          color: entry.color || PALETTE[colorCursor % PALETTE.length],
          key: entry.key || "",
          speed: entry.speed || 1,
          hasSound: true,
          hasOverride: false
        };
        colorCursor++;
        pads.push(pad);
      } else {
        pad.soundFile = "sounds/" + entry.file;
        pad.hasSound = true;
      }
    });
    resolveKeyConflicts();
    saveState();
  }

  /* ---------------- Playback: persistent per-pad audio ---------------- */
  async function ensureUrl(pad){
    if(pad.source === "repo" && !pad.hasOverride){
      return pad.soundFile;
    }
    const blob = await idbGet(pad.hasOverride ? "override:" + pad.id : pad.id);
    if(!blob) return null;
    if(objectUrls.has(pad.id)) return objectUrls.get(pad.id);
    const url = URL.createObjectURL(blob);
    objectUrls.set(pad.id, url);
    return url;
  }

  function invalidatePadAudio(padId){
    const audio = padAudioElements.get(padId);
    if(audio){
      try{ audio.pause(); }catch(e){}
      padAudioElements.delete(padId);
    }
    if(objectUrls.has(padId)){
      const cached = objectUrls.get(padId);
      if(cached && cached.startsWith("blob:")) URL.revokeObjectURL(cached);
      objectUrls.delete(padId);
    }
  }

  async function ensureAudioElement(pad){
    let url;
    try{ url = await ensureUrl(pad); }catch(err){ console.error(err); return null; }
    if(!url) return null;
    let audio = padAudioElements.get(pad.id);
    if(audio && audio.dataset.srcUrl === url) return audio;
    if(audio){ try{ audio.pause(); }catch(e){} }
    audio = new Audio(url);
    audio.preload = "auto";
    audio.dataset.srcUrl = url;
    audio.playbackRate = pad.speed || 1;
    audio.addEventListener("ended", () => {
      updatePlayingClass(pad.id, false);
      setProgress(pad.id, 0);
    });
    audio.addEventListener("timeupdate", () => {
      if(audio.duration) setProgress(pad.id, audio.currentTime / audio.duration);
    });
    audio.addEventListener("error", () => {
      updatePlayingClass(pad.id, false);
      setProgress(pad.id, 0);
      toast("„" + (pad.label || "Sound") + "“ konnte nicht geladen werden — Datei fehlt oder ist beschädigt.");
    });
    padAudioElements.set(pad.id, audio);
    return audio;
  }

  async function prewarmPad(pad){
    if(!pad.hasSound) return;
    try{ await ensureAudioElement(pad); }catch(e){}
  }
  function prewarmAll(){
    pads.forEach(pad => { prewarmPad(pad); });
  }

  function setProgress(padId, ratio){
    const bar = grid.querySelector(`[data-progress="${padId}"]`);
    if(bar) bar.style.width = Math.max(0, Math.min(1, ratio)) * 100 + "%";
  }

  async function playPad(pad){
    const audio = await ensureAudioElement(pad);
    if(!audio){ toast("„" + (pad.label || "Sound") + "“ konnte nicht geladen werden."); return; }
    audio.volume = volume;
    audio.playbackRate = pad.speed || 1;
    try{
      audio.pause();
      audio.currentTime = 0;
      setProgress(pad.id, 0);
      await audio.play();
      updatePlayingClass(pad.id, true);
    }catch(err){
      updatePlayingClass(pad.id, false);
      toast("„" + (pad.label || "Sound") + "“ konnte nicht abgespielt werden.");
    }
  }

  function stopPad(padId){
    const audio = padAudioElements.get(padId);
    if(audio){
      try{ audio.pause(); audio.currentTime = 0; }catch(e){}
    }
    updatePlayingClass(padId, false);
    setProgress(padId, 0);
  }

  /* ---------------- Drag to reorder ---------------- */
  let dragState = null;

  function startPadDrag(padId, sourceEl, e){
    dragState = { padId, sourceEl };
    sourceEl.classList.add("drag-source");
    try{ sourceEl.setPointerCapture(e.pointerId); }catch(err){}
    window.addEventListener("pointermove", onPadDragMove);
    window.addEventListener("pointerup", onPadDragEnd);
    window.addEventListener("pointercancel", onPadDragEnd);
  }

  function onPadDragMove(e){
    if(!dragState) return;
    grid.querySelectorAll(".pad.drag-over").forEach(el => el.classList.remove("drag-over"));
    const target = document.elementFromPoint(e.clientX, e.clientY);
    const targetPad = target && target.closest(".pad");
    if(targetPad && targetPad !== dragState.sourceEl && targetPad.dataset.id){
      targetPad.classList.add("drag-over");
    }
  }

  function onPadDragEnd(e){
    if(!dragState) return;
    window.removeEventListener("pointermove", onPadDragMove);
    window.removeEventListener("pointerup", onPadDragEnd);
    window.removeEventListener("pointercancel", onPadDragEnd);
    dragState.sourceEl.classList.remove("drag-source");
    try{ dragState.sourceEl.releasePointerCapture(e.pointerId); }catch(err){}

    const target = document.elementFromPoint(e.clientX, e.clientY);
    const targetPad = target && target.closest(".pad");
    grid.querySelectorAll(".pad.drag-over").forEach(el => el.classList.remove("drag-over"));

    if(targetPad && targetPad.dataset.id && targetPad.dataset.id !== dragState.padId){
      reorderPads(dragState.padId, targetPad.dataset.id);
    }
    dragState = null;
  }

  function reorderPads(sourceId, targetId){
    const sourceIndex = pads.findIndex(p => p.id === sourceId);
    const targetIndex = pads.findIndex(p => p.id === targetId);
    if(sourceIndex === -1 || targetIndex === -1) return;
    const [moved] = pads.splice(sourceIndex, 1);
    pads.splice(targetIndex, 0, moved);
    saveState();
    render();
    toast("Reihenfolge geändert.");
  }

  function updatePlayingClass(padId, on){
    const el = grid.querySelector(`.pad[data-id="${padId}"]`);
    if(el) el.classList.toggle("playing", on);
  }

  function stopAll(){

      setProgress(padId, 0);
    });
  }

  function formatTime(sec){

  /* ---------------- Recording + shared waveform/trim editor ---------------- */
  let mediaRecorder = null;

  function getAudioCtx(){
    if(!window.__sbCtx) window.__sbCtx = new (window.AudioContext || window.webkitAudioContext)();
    return window.__sbCtx;
  }

  function drawWaveform(canvas, audioBuffer){
    const dpr = window.devicePixelRatio || 1;
    const cssWidth = canvas.clientWidth || 300;
    const cssHeight = canvas.clientHeight || 52;
    canvas.width = cssWidth * dpr;
    canvas.height = cssHeight * dpr;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const data = audioBuffer.getChannelData(0);
    const width = canvas.width;
    const height = canvas.height;
    const step = Math.max(1, Math.ceil(data.length / width));
    const amp = height / 2;
    ctx.fillStyle = "rgba(255,255,255,0.3)";
    for(let i = 0; i < width; i++){
      let min = 1.0, max = -1.0;
      const start = i * step;
      for(let j = 0; j < step; j++){
        const datum = data[start + j] || 0;
        if(datum < min) min = datum;
        if(datum > max) max = datum;
      }
      const y = (1 + min) * amp;
      const h = Math.max(1, (max - min) * amp);
      ctx.fillRect(i, y, 1, h);
    }
  }

  function updateTrimHighlight(){
    if(!currentAudioBuffer) return;
    const dur = currentAudioBuffer.duration;
    const s = parseFloat(trimStartInput.value);
    const e = parseFloat(trimEndInput.value);
    trimHighlight.style.left = (dur ? (s / dur) * 100 : 0) + "%";
    trimHighlight.style.right = (dur ? 100 - (e / dur) * 100 : 0) + "%";
    trimStartLabel.textContent = formatTime(s);
    trimEndLabel.textContent = formatTime(e);
  }

  function trimAudioBuffer(audioBuffer, startSec, endSec, ctx){
    const sampleRate = audioBuffer.sampleRate;
    const startSample = Math.max(0, Math.floor(startSec * sampleRate));
    const endSample = Math.min(audioBuffer.length, Math.floor(endSec * sampleRate));
    const frameCount = Math.max(1, endSample - startSample);
    const newBuffer = ctx.createBuffer(audioBuffer.numberOfChannels, frameCount, sampleRate);
    for(let ch = 0; ch < audioBuffer.numberOfChannels; ch++){
      const channelData = audioBuffer.getChannelData(ch).subarray(startSample, startSample + frameCount);
      newBuffer.copyToChannel(new Float32Array(channelData), ch);
    }
    return newBuffer;
  }

  function writeString(view, offset, string){
    for(let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
  }
  function floatTo16BitPCM(output, offset, input){
    for(let i = 0; i < input.length; i++, offset += 2){
      const s = Math.max(-1, Math.min(1, input[i]));
      output.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7fff, true);
    }
  }
  function interleave(left, right){
    const length = left.length + right.length;
    const result = new Float32Array(length);
    let index = 0, inputIndex = 0;
    while(index < length){
      result[index++] = left[inputIndex];
      result[index++] = right[inputIndex];
      inputIndex++;
    }
    return result;
  }
  function audioBufferToWav(buffer){
    const numChannels = buffer.numberOfChannels;
    const sampleRate = buffer.sampleRate;
    const bitDepth = 16;
    const samples = numChannels === 2
      ? interleave(buffer.getChannelData(0), buffer.getChannelData(1))
      : buffer.getChannelData(0);
    const bytesPerSample = bitDepth / 8;
    const blockAlign = numChannels * bytesPerSample;
    const dataSize = samples.length * bytesPerSample;
    const arrayBuffer = new ArrayBuffer(44 + dataSize);
    const view = new DataView(arrayBuffer);
    writeString(view, 0, "RIFF");
    view.setUint32(4, 36 + dataSize, true);
    writeString(view, 8, "WAVE");
    writeString(view, 12, "fmt ");
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * blockAlign, true);
    view.setUint16(32, blockAlign, true);
    view.setUint16(34, bitDepth, true);
    writeString(view, 36, "data");
    view.setUint32(40, dataSize, true);
    floatTo16BitPCM(view, 44, samples);
    return new Blob([view], { type: "audio/wav" });
  }

  async function openEditorWithBlob(blob, labelHint){
    pendingLabelHint = labelHint ? labelHint.replace(/\.[^/.]+$/, "") : null;
    try{
      const arrayBuffer = await blob.arrayBuffer();
      const ctx = getAudioCtx();
      currentAudioBuffer = await ctx.decodeAudioData(arrayBuffer);

      if(editorPreviewUrl) URL.revokeObjectURL(editorPreviewUrl);
      editorPreviewUrl = URL.createObjectURL(blob);
      editorPreviewAudio.src = editorPreviewUrl;

      editorPanel.classList.remove("hidden-input");
      drawWaveform(waveformCanvas, currentAudioBuffer);

      const dur = currentAudioBuffer.duration;
      const stepVal = Math.max(0.01, dur / 300);
      trimStartInput.min = 0; trimStartInput.max = dur; trimStartInput.step = stepVal; trimStartInput.value = 0;
      trimEndInput.min = 0; trimEndInput.max = dur; trimEndInput.step = stepVal; trimEndInput.value = dur;
      updateTrimHighlight();
      fileCurrent.textContent = "Bereit zum Zuschneiden — unten „Übernehmen“ klicken.";
    }catch(err){
      console.error(err);
      toast("Diese Audiodatei kann nicht bearbeitet werden.");
    }
  }

  function clearEditor(){
    if(editorPreviewUrl){ URL.revokeObjectURL(editorPreviewUrl); editorPreviewUrl = null; }
    currentAudioBuffer = null;
    pendingLabelHint = null;
    editorPreviewAudio.removeAttribute("src");
    editorPanel.classList.add("hidden-input");
    trimStartInput.value = 0;
    trimEndInput.value = 1;
    trimStartLabel.textContent = "0:00";
    trimEndLabel.textContent = "0:00";
    trimHighlight.style.left = "0%";
    trimHighlight.style.right = "0%";
  }

  function resetRecordingUI(){
    if(mediaRecorder && mediaRecorder.state === "recording"){
      try{ mediaRecorder.stop(); }catch(e){}
    }
    if(recordStream){
      recordStream.getTracks().forEach(t => t.stop());
      recordStream = null;
    }
    clearInterval(recordTimerInterval);
    recordTimerEl.textContent = "";
    recordBtn.classList.remove("record-active");
    recordBtn.innerHTML = iconSvg("mic") + " Sound aufnehmen";
    clearEditor();
  }

  recordBtn.addEventListener("click", async () => {
    if(mediaRecorder && mediaRecorder.state === "recording"){
      mediaRecorder.stop();
      return;
    }
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      toast("Aufnahme wird von diesem Browser nicht unterstützt.");
      return;
    }
    try{
      recordStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    }catch(err){
      toast("Kein Zugriff aufs Mikrofon erhalten.");
      return;
    }
    recordedChunks = [];
    const mimeCandidates = ["audio/webm", "audio/mp4", "audio/ogg"];
    const supported = mimeCandidates.find(m => window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m));
    mediaRecorder = supported ? new MediaRecorder(recordStream, { mimeType: supported }) : new MediaRecorder(recordStream);

    mediaRecorder.ondataavailable = (e) => { if(e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      if(recordStream){ recordStream.getTracks().forEach(t => t.stop()); recordStream = null; }
      clearInterval(recordTimerInterval);
      recordTimerEl.textContent = "";
      recordBtn.classList.remove("record-active");
      recordBtn.innerHTML = iconSvg("mic") + " Sound aufnehmen";
      const type = mediaRecorder.mimeType || "audio/webm";
      const blob = new Blob(recordedChunks, { type });
      await openEditorWithBlob(blob, "Aufnahme");
    };

    mediaRecorder.start();
    recordStartTime = Date.now();
    recordBtn.classList.add("record-active");
    recordBtn.innerHTML = `<span class="rec-dot"></span> Aufnahme stoppen`;
    editorPanel.classList.add("hidden-input");
    recordTimerInterval = setInterval(() => {
      const s = Math.floor((Date.now() - recordStartTime) / 1000);
      recordTimerEl.textContent = formatTime(s);
    }, 250);
  });

  trimStartInput.addEventListener("input", () => {
    const minGap = 0.05;
    if(parseFloat(trimStartInput.value) > parseFloat(trimEndInput.value) - minGap){
      trimStartInput.value = Math.max(0, parseFloat(trimEndInput.value) - minGap);
    }
    updateTrimHighlight();
  });
  trimEndInput.addEventListener("input", () => {
    const minGap = 0.05;
    const maxDur = currentAudioBuffer ? currentAudioBuffer.duration : parseFloat(trimEndInput.max || 1);
    if(parseFloat(trimEndInput.value) < parseFloat(trimStartInput.value) + minGap){
      trimEndInput.value = Math.min(maxDur, parseFloat(trimStartInput.value) + minGap);
    }
    updateTrimHighlight();
  });

  document.getElementById("previewTrimBtn").addEventListener("click", () => {
    if(!editorPreviewUrl) return;
    const start = parseFloat(trimStartInput.value);
    const end = parseFloat(trimEndInput.value);
    try{ editorPreviewAudio.currentTime = start; }catch(e){}
    editorPreviewAudio.play();
    const onTime = () => {
      if(editorPreviewAudio.currentTime >= end){
        editorPreviewAudio.pause();
        editorPreviewAudio.removeEventListener("timeupdate", onTime);
      }
    };
    editorPreviewAudio.addEventListener("timeupdate", onTime);
  });

  document.getElementById("discardEditBtn").addEventListener("click", () => {
    clearEditor();
  });

  document.getElementById("applyEditBtn").addEventListener("click", async () => {
    if(!currentAudioBuffer){ toast("Nichts zum Übernehmen."); return; }
    try{
      const start = parseFloat(trimStartInput.value);
      const end = parseFloat(trimEndInput.value);
      const trimmed = trimAudioBuffer(currentAudioBuffer, start, end, getAudioCtx());
      const wavBlob = audioBufferToWav(trimmed);
      const file = new File([wavBlob], (pendingLabelHint || "sound") + ".wav", { type: "audio/wav" });
      await commitSound(file);
      clearEditor();
    }catch(err){
      console.error(err);
      toast("Konnte nicht übernommen werden.");
    }
  });

  trimExistingBtn.addEventListener("click", async () => {
    const pad = pads.find(p => p.id === editingId);
    if(!pad || !pad.hasSound) return;
    try{
      let blob;
      if(pad.source === "repo" && !pad.hasOverride){
        const res = await fetch(pad.soundFile);
        blob = await res.blob();
      } else {
        blob = await idbGet(pad.hasOverride ? "override:" + pad.id : pad.id);
      }
      if(!blob){ toast("Sound konnte nicht geladen werden."); return; }
      await openEditorWithBlob(blob, pad.label);
    }catch(err){
      console.error(err);
      toast("Dieser Sound kann nicht bearbeitet werden.");
    }
  });

  function openModal(padId){
    editingId = padId;
    resetRecordingUI();
    const pad = pads.find(p => p.id === padId);
    labelInput.value = pad.label || "";
    emojiInput.value = pad.emoji || "";
    refreshSourceUI(pad);

    const usedKeys = new Set(pads.filter(p => p.id !== padId).map(p => p.key).filter(Boolean));
    keySelect.innerHTML = `<option value="">— keins —</option>` +
      DEFAULT_KEYS.map(k => `<option value="${k}" ${k===pad.key?"selected":""} ${usedKeys.has(k)&&k!==pad.key?"disabled":""}>${k.toUpperCase()}${usedKeys.has(k)&&k!==pad.key?" (belegt)":""}</option>`).join("");

    swatchesEl.innerHTML = "";
    PALETTE.forEach(color => {
      const s = document.createElement("div");
      s.className = "swatch" + (pad.color === color ? " selected" : "");
      s.style.background = color;
      s.dataset.color = color;
      s.addEventListener("click", () => {
        swatchesEl.querySelectorAll(".swatch").forEach(x => x.classList.remove("selected"));
        s.classList.add("selected");
      });
      swatchesEl.appendChild(s);
    });

    document.getElementById("modalTitle").textContent = pad.hasSound ? "Pad bearbeiten" : "Sound zuweisen";
    overlay.classList.add("open");
    labelInput.focus();
  }

  function refreshSourceUI(pad){
    if(pad.source === "repo"){
      sourceTag.textContent = pad.hasOverride ? "Eigene Version" : "Preset";
      fileCurrent.textContent = pad.hasOverride ? "Du nutzt aktuell deine eigene Version dieses Sounds." : (pad.hasSound ? "Das ist ein voreingestellter Sound." : "");
      resetOverrideBtn.classList.toggle("hidden-input", !pad.hasOverride);
      deletePadBtn.textContent = "Ausblenden";
    } else {
      sourceTag.textContent = "Eigener Sound";
      fileCurrent.textContent = pad.hasSound ? "Sound ist gespeichert." : "";
      resetOverrideBtn.classList.add("hidden-input");
      deletePadBtn.textContent = "Löschen";
    }
    trimExistingBtn.classList.toggle("hidden-input", !pad.hasSound);
  }

  function closeModal(){
    overlay.classList.remove("open");
    editingId = null;
    fileInput.value = "";
    resetRecordingUI();
    if(document.activeElement && overlay.contains(document.activeElement)){
      document.activeElement.blur();
    }
  }

  document.getElementById("cancelBtn").addEventListener("click", closeModal);
  overlay.addEventListener("click", (e) => { if(e.target === overlay) closeModal(); });

  async function commitSound(file){
    const pad = pads.find(p => p.id === editingId);
    if(!pad){ return; }
    if(!file || file.size === 0){ toast("Diese Datei scheint leer zu sein."); return; }
    fileCurrent.textContent = "Wird gespeichert …";
    try{
      await assignFileToPad(pad, file);
      saveState();
      render();
      refreshSourceUI(pad);
      fileCurrent.textContent = "Gespeichert: " + (pad.label || "Sound");
      toast("Sound gespeichert.");
    }catch(err){
      console.error(err);
      fileCurrent.textContent = "";
      toast("Der Sound konnte nicht gespeichert werden.");
    }
  }

  dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("dragover"); });
  dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
  dropzone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropzone.classList.remove("dragover");
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if(f && isAudioFile(f)){
      openEditorWithBlob(f, f.name);
    } else if(f){
      toast("Das ist keine unterstützte Audiodatei.");
    }
  });
  fileInput.addEventListener("change", () => {
    const f = fileInput.files && fileInput.files[0];
    if(f) openEditorWithBlob(f, f.name);
  });

  resetOverrideBtn.addEventListener("click", async () => {
    const pad = pads.find(p => p.id === editingId);
    if(!pad) return;
    try{
      await idbDelete("override:" + pad.id);
      invalidatePadAudio(pad.id);
      pad.hasOverride = false;
      saveState();
      render();
      refreshSourceUI(pad);
      toast("Preset wiederhergestellt.");
    }catch(err){
      console.error(err);
      toast("Das hat nicht funktioniert.");
    }
  });

  deletePadBtn.addEventListener("click", async () => {
    const pad = pads.find(p => p.id === editingId);
    if(!pad) return;

    if(pad.source === "repo"){
      if(!confirm("Diesen Sound nur für dich ausblenden?")) return;
      try{
        const hidden = getHidden();
        hidden.add(pad.id);
        setHidden(hidden);
        await idbDelete("override:" + pad.id);
        invalidatePadAudio(pad.id);
        pads = pads.filter(p => p.id !== pad.id);
        saveState();
        render();
        closeModal();
        toast("Ausgeblendet.");
      }catch(err){
        console.error(err);
        toast("Das hat nicht funktioniert.");
      }
    } else {
      if(!confirm("Diesen Sound wirklich löschen?")) return;
      try{
        await idbDelete(pad.id);
        invalidatePadAudio(pad.id);
        pads = pads.filter(p => p.id !== pad.id);
        saveState();
        render();
        closeModal();
        toast("Gelöscht.");
      }catch(err){
        console.error(err);
        toast("Das hat nicht funktioniert.");
      }
    }
  });

  document.getElementById("saveBtn").addEventListener("click", async () => {
    const pad = pads.find(p => p.id === editingId);
    if(!pad) return;
    try{
      pad.label = labelInput.value.trim().slice(0, 24);
      pad.emoji = emojiInput.value.trim().slice(0, 4);
      const chosenSwatch = swatchesEl.querySelector(".swatch.selected");
      if(chosenSwatch) pad.color = chosenSwatch.dataset.color;

      const newKey = keySelect.value;
      pads.forEach(p => { if(p.id !== pad.id && newKey && p.key === newKey) p.key = ""; });
      pad.key = newKey;

      saveState();
      render();
      closeModal();
      toast("Gespeichert.");
    }catch(err){
      console.error(err);
      toast("Beim Speichern ist etwas schiefgelaufen.");
    }
  });

  /* ---------------- Global controls ---------------- */
  const volumeSlider = document.getElementById("volumeSlider");
  volumeSlider.addEventListener("input", () => {
    volume = parseFloat(volumeSlider.value);
    padAudioElements.forEach(a => { try{ a.volume = volume; }catch(e){} });
    saveState();
  });
  document.getElementById("stopAllBtn").addEventListener("click", stopAll);

  /* ---------------- Keyboard shortcuts ---------------- */
  window.addEventListener("keydown", (e) => {
    if(e.repeat) return;
    const tag = (e.target.tagName || "").toLowerCase();
    if(tag === "input" || tag === "select" || tag === "textarea") return;
    if(overlay.classList.contains("open")) return;
    const key = e.key.toLowerCase();
    const pad = pads.find(p => p.key === key);
    if(pad && pad.hasSound) playPad(pad);
  });

  /* ---------------- Export / Import ---------------- */
  function blobToBase64(blob){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }
  function base64ToBlob(base64, type){
    const bytes = atob(base64);
    const arr = new Uint8Array(bytes.length);
    for(let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    return new Blob([arr], { type });
  }

  document.getElementById("exportBtn").addEventListener("click", async () => {
    toast("Wird vorbereitet …");
    try{
      const soundsOut = {};
      for(const pad of pads){
        const isLocalSound = pad.source === "local" && pad.hasSound;
        const isOverride = pad.source === "repo" && pad.hasOverride;
        if(!isLocalSound && !isOverride) continue;
        const key = isOverride ? "override:" + pad.id : pad.id;
        const blob = await idbGet(key);
        if(!blob) continue;
        soundsOut[key] = { base64: await blobToBase64(blob), type: blob.type || "audio/wav" };
      }
      const payload = { version: 4, pads, hidden: [...getHidden()], sounds: soundsOut };
      const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "soundboard.json";
      a.click();
      URL.revokeObjectURL(url);
      toast("Gesichert.");
    }catch(err){
      console.error(err);
      toast("Das hat nicht funktioniert.");
    }
  });

  document.getElementById("importBtn").addEventListener("click", () => {
    document.getElementById("importInput").click();
  });
  document.getElementById("importInput").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      if(!data.pads) throw new Error("Ungültige Datei");
      if(!confirm("Das ersetzt dein aktuelles Soundboard. Fortfahren?")) return;

      for(const pad of pads){
        invalidatePadAudio(pad.id);
        if(pad.source === "local" && pad.hasSound) await idbDelete(pad.id);
        if(pad.source === "repo" && pad.hasOverride) await idbDelete("override:" + pad.id);
      }

      pads = data.pads;
      setHidden(new Set(data.hidden || []));
      for(const [key, s] of Object.entries(data.sounds || {})){
        const blob = base64ToBlob(s.base64, s.type);
        await idbSet(key, blob);
      }
      saveState();
      await loadManifestAndMerge();
      render();
      toast("Geladen.");
    }catch(err){
      console.error(err);
      alert("Das ist keine gültige Soundboard-Datei.");
    }finally{
      e.target.value = "";
    }
  });

  document.getElementById("clearAllSoundsBtn").addEventListener("click", async () => {
    if(pads.length === 0){ toast("Es sind schon keine Pads vorhanden."); return; }
    if(!confirm("Wirklich alle Pads entfernen? Eigene Sounds werden gelöscht, Presets werden ausgeblendet (später über den Link unten wieder einblendbar).")) return;
    try{
      const hidden = getHidden();
      for(const pad of pads){
        invalidatePadAudio(pad.id);
        if(pad.source === "repo"){
          hidden.add(pad.id);
          if(pad.hasOverride) await idbDelete("override:" + pad.id);
        } else if(pad.hasSound){
          await idbDelete(pad.id);
        }
      }
      setHidden(hidden);
      pads = [];
      saveState();
      render();
      toast("Alle Pads entfernt.");
    }catch(err){
      console.error(err);
      toast("Das hat nicht funktioniert.");
    }
  });

  document.getElementById("resetAllBtn").addEventListener("click", async () => {
    if(!confirm("Wirklich alle gespeicherten Daten für dieses Soundboard löschen (eigene Sounds, Einstellungen, Lautstärke) und die Seite neu laden?")) return;
    try{
      padAudioElements.forEach(audio => { try{ audio.pause(); }catch(e){} });
      localStorage.clear();
      await new Promise((resolve) => {
        const req = indexedDB.deleteDatabase(DB_NAME);
        req.onsuccess = () => resolve();
        req.onerror = () => resolve();
        req.onblocked = () => resolve();
      });
    }catch(err){
      console.error(err);
    }
    location.reload();
  });

  /* ---------------- Init ---------------- */
  (async function init(){
    loadLocalState();
    volumeSlider.value = volume;
    renderSkeleton();
    await loadManifestAndMerge();
    render();
  })();
})();
</script>
</body>
</html>
